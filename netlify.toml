# Global settings applied to the whole site.
#
# “base” is the directory to change to before starting build. If you set base:
#        that is where we will look for package.json/.nvmrc/etc, not repo root!
# “command” is your build command.
# “publish” is the directory to publish (relative to the root of your repo).

[build]
  publish = "dist"

# SPA fallback: любой неизвестный путь отдаёт index.html,
# чтобы клиентский роутер мог обработать его сам (в т.ч. при перезагрузке страницы).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://ya-praktikum.tech; font-src 'self' data:; connect-src 'self' https://ya-praktikum.tech wss://ya-praktikum.tech; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
